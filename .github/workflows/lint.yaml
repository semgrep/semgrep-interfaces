name: Linting

on:
  pull_request: {}
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write # for comments

jobs:
  compatibility:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout tree
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        fetch-depth: 0
        fetch-tags: true
    - uses: semgrep/setup-ocaml@ce6a88f72f48e02a172c93eb93177b21659e7032
      with:
        cache-prefix: v1
        ocaml-compiler: 5.3.0
        opam-pin: false
        save-opam-post-run: true
    - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      with:
        enable-cache: auto
        python-version: "3.11"
        version: 0.9.26
    - name: install deps
      run: make setup
    - name: atddiff all supported tags
      id: diff
      shell: bash
      run: |
        set -x
        git config --global --add safe.directory "$(pwd)"
        # fail if check command fails
        set -o pipefail
        # make it easier for people to check compatibility
        make test-backwards-compatibility > summary.txt

    - uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405
      if: ${{ !cancelled() }}
      with:
        header: diff-summary
        path: summary.txt

  mypy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout tree
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
    - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      with:
        enable-cache: auto
        python-version: "3.11"
        version: 0.9.26
    - name: Run mypy on semgrep_output_v1.py
      run: make typecheck

  schema-validation:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout tree
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
    - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      with:
        enable-cache: auto
        python-version: "3.11"
        version: 0.9.26
    - name: check schema compatible
      run: make test-schema-validation
